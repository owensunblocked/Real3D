<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fireout Studio</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: #2b2b2b;
    font-family: Arial;
    color: #ddd;
}

/* TOP BAR */
#topbar {
    height: 40px;
    background: #3c3c3c;
    display: flex;
    align-items: center;
    padding: 5px;
}

/* LEFT TOOLBAR */
#toolbar {
    position: absolute;
    left: 0;
    top: 40px;
    width: 50px;
    height: calc(100% - 40px);
    background: #3a3a3a;
}

/* RIGHT PANEL */
#sidebar {
    position: absolute;
    right: 0;
    top: 40px;
    width: 260px;
    height: calc(100% - 40px);
    background: #313131;
    padding: 10px;
}

/* BOTTOM SCRIPT PANEL */
#bottomPanel {
    position: absolute;
    bottom: 0;
    left: 50px;
    right: 260px;
    height: 150px;
    background: #1f1f1f;
}

textarea {
    width: 100%;
    height: 110px;
    background: #111;
    color: #0f0;
    border: none;
}

/* PREVIEW WINDOW */
#preview {
    position: absolute;
    top: 50px;
    right: 270px;
    width: 300px;
    height: 200px;
    border: 2px solid black;
}

/* BUTTONS */
button {
    background: #4a4a4a;
    border: none;
    color: white;
    margin-right: 5px;
    padding: 5px;
}
</style>
</head>

<body>

<div id="topbar">
    <button onclick="addCube()">Cube</button>
    <button onclick="addSphere()">Sphere</button>
    <button onclick="addPlane()">Plane</button>
</div>

<div id="toolbar"></div>

<div id="sidebar">
    <h3>Properties</h3>
    <div id="info">Nothing selected</div>
</div>

<div id="bottomPanel">
<textarea id="scriptBox">// type JS here</textarea>
<button onclick="runScript()">Run</button>
</div>

<canvas id="preview"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>

<script>
let scene = new THREE.Scene();
scene.background = new THREE.Color(0x2b2b2b);

/* MAIN CAMERA */
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(3,3,5);

/* PREVIEW CAMERA */
let previewCamera = new THREE.PerspectiveCamera(75, 300/200, 0.1, 1000);
previewCamera.position.set(0,2,5);

/* RENDERERS */
let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

let previewRenderer = new THREE.WebGLRenderer({
    canvas: document.getElementById("preview")
});
previewRenderer.setSize(300,200);

/* LIGHTS */
let light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,5,5);
scene.add(light);
scene.add(new THREE.AmbientLight(0x404040));

/* OBJECT SYSTEM */
let objects = [];
let selected = null;

function addCube(){
    let m = new THREE.Mesh(
        new THREE.BoxGeometry(),
        new THREE.MeshStandardMaterial({color:0x888888})
    );
    scene.add(m);
    objects.push(m);
}

function addSphere(){
    let m = new THREE.Mesh(
        new THREE.SphereGeometry(0.5,32,32),
        new THREE.MeshStandardMaterial({color:0x888888})
    );
    scene.add(m);
    objects.push(m);
}

function addPlane(){
    let m = new THREE.Mesh(
        new THREE.PlaneGeometry(5,5),
        new THREE.MeshStandardMaterial({color:0x555555, side:2})
    );
    m.rotation.x = Math.PI/2;
    scene.add(m);
    objects.push(m);
}

/* SELECT */
let raycaster = new THREE.Raycaster();
let mouse = new THREE.Vector2();

window.addEventListener("click", e=>{
    mouse.x = (e.clientX/window.innerWidth)*2-1;
    mouse.y = -(e.clientY/window.innerHeight)*2+1;

    raycaster.setFromCamera(mouse,camera);
    let hit = raycaster.intersectObjects(objects);

    if(hit.length){
        selected = hit[0].object;
        document.getElementById("info").innerText = selected.type;
    }
});

/* CAMERA LOOK (RIGHT CLICK HOLD) */
let isLooking = false;

window.addEventListener("mousedown", e=>{
    if(e.button === 2) isLooking = true;
});
window.addEventListener("mouseup", e=>{
    if(e.button === 2) isLooking = false;
});
window.addEventListener("mousemove", e=>{
    if(!isLooking) return;

    camera.rotation.y -= e.movementX * 0.002;
    camera.rotation.x -= e.movementY * 0.002;
});

/* DISABLE RIGHT CLICK MENU */
window.addEventListener("contextmenu", e=>e.preventDefault());

/* OBJECT CONTROLS */
window.addEventListener("keydown", e=>{
    if(!selected) return;

    let s=0.2;

    if(e.key==="w") selected.position.z-=s;
    if(e.key==="s") selected.position.z+=s;
    if(e.key==="a") selected.position.x-=s;
    if(e.key==="d") selected.position.x+=s;

    if(e.key==="q") selected.rotation.y-=0.1;
    if(e.key==="e") selected.rotation.y+=0.1;

    if(e.key==="z") selected.scale.multiplyScalar(0.9);
    if(e.key==="x") selected.scale.multiplyScalar(1.1);
});

/* PREVIEW CAMERA MOVE */
window.addEventListener("keydown", e=>{
    let s=0.3;

    if(e.key==="i") previewCamera.position.z-=s;
    if(e.key==="k") previewCamera.position.z+=s;
    if(e.key==="j") previewCamera.position.x-=s;
    if(e.key==="l") previewCamera.position.x+=s;
});

/* SCRIPT */
function runScript(){
    try{ eval(document.getElementById("scriptBox").value); }
    catch(e){ alert(e); }
}

/* LOOP */
function animate(){
    requestAnimationFrame(animate);

    renderer.render(scene,camera);
    previewRenderer.render(scene,previewCamera);
}
animate();
</script>

</body>
</html>
